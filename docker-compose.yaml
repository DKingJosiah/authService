# docker-compose.yml
version: '3.8'

services:
  auth-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/auth
      - SECRET_KEY=your-production-secret
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=auth
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: